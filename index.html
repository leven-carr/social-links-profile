<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="styles.css" />

    <title>Frontend Mentor | Social links profile</title>
  </head>
  <body>
    <main class="flex-container main">
      <section class="flex-container card">
        <img
          src="assets/images/avatar-jessica.jpeg"
          alt="Profile picture of young woman"
        />
        <h1>Jessica Randall</h1>
        <p class="location">London, United Kingdom</p>
        <p class="bio">"Front-end developer and avid reader."</p>

        <ul class="flex-container links-list">
          <li class="link-wrapper"><a href="">GitHub</a></li>
          <li class="link-wrapper"><a href="">Frontend Mentor</a></li>
          <li class="link-wrapper"><a href="">LinkedIn</a></li>
          <li class="link-wrapper"><a href="">Twitter</a></li>
          <li class="link-wrapper"><a href="">Instagram</a></li>
        </ul>
      </section>
    </main>

    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">Leven Carr</a>.
    </footer>
  </body>
</html>
